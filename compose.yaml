services:

  postgres:
    image: postgres:15.6
    environment:
      POSTGRES_DB: alfresco
      POSTGRES_USER: alfresco
      POSTGRES_PASSWORD: alfresco
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d alfresco -U alfresco"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  activemq:
    image: docker.io/alfresco/alfresco-activemq:6.2.1-jre17-rockylinux8
    environment:
      ACTIVEMQ_OPTS: "-Xms256m -Xmx512m"
      ACTIVEMQ_USERNAME: admin
      ACTIVEMQ_PASSWORD: admin
    healthcheck:
      test: /opt/activemq/bin/activemq query --user admin --password admin --objname "type=Broker,brokerName=*,service=Health" | grep Good
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - activemq-data:/opt/activemq/data

  transform-core-aio:
    image: alfresco/alfresco-transform-core-aio:5.4.0
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"
      ACTIVEMQ_URL: "failover:(tcp://activemq:61616)?timeout=3000"
      SPRING_ACTIVEMQ_USER: admin
      SPRING_ACTIVEMQ_PASSWORD: admin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      activemq:
        condition: service_healthy

  solr6:
    image: alfresco/alfresco-search-services:2.0.18
    environment:
      SOLR_ALFRESCO_HOST: alfresco
      SOLR_ALFRESCO_PORT: "8080"
      SOLR_SOLR_HOST: solr6
      SOLR_SOLR_PORT: "8983"
      SOLR_CREATE_ALFRESCO_DEFAULTS: alfresco,archive
      ALFRESCO_SECURE_COMMS: secret
      JAVA_TOOL_OPTIONS: >-
        -Dalfresco.secureComms.secret=secret
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "X-Alfresco-Search-Secret: secret",
             "http://localhost:8983/solr/alfresco/admin/ping"]
      interval: 20s
      timeout: 10s
      retries: 5
    volumes:
      - solr-data:/opt/alfresco-search-services/data

  alfresco:
    image: alfresco/alfresco-content-repository-community:26.1.0
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Dencryption.keystore.type=JCEKS
        -Dencryption.cipherAlgorithm=DESede/CBC/PKCS5Padding
        -Dencryption.keyAlgorithm=DESede
        -Dencryption.keystore.location=/usr/local/tomcat/shared/classes/alfresco/extension/keystore/keystore
        -Dmetadata-keystore.password=mp6yc0UD9e
        -Dmetadata-keystore.aliases=metadata
        -Dmetadata-keystore.metadata.password=oKIWzVdEdA
        -Dmetadata-keystore.metadata.algorithm=DESede
      JAVA_OPTS: >-
        -Ddb.driver=org.postgresql.Driver
        -Ddb.username=alfresco
        -Ddb.password=alfresco
        -Ddb.url=jdbc:postgresql://postgres:5432/alfresco
        -Dsolr.host=solr6
        -Dsolr.port=8983
        -Dsolr.secureComms=secret
        -Dsolr.sharedSecret=secret
        -Dsolr.base.url=/solr
        -Dindex.subsystem.name=solr6
        -Dalfresco.host=localhost
        -Dalfresco.port=8080
        -Dalfresco.protocol=http
        -DlocalTransform.core-aio.url=http://transform-core-aio:8090/
        -Dalfresco.restApi.basicAuthScheme=true
        -Dspring.activemq.brokerUrl=failover:(tcp://activemq:61616)?timeout=3000
        -Dspring.activemq.user=admin
        -Dspring.activemq.password=admin
        -Xms1g -Xmx2g
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f",
             "http://localhost:8080/alfresco/api/-default-/public/alfresco/versions/1/probes/-ready-"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      activemq:
        condition: service_healthy
      transform-core-aio:
        condition: service_healthy
    volumes:
      - alfresco-data:/usr/local/tomcat/alf_data
      - ./target/content-dedup-1.0.0-SNAPSHOT.jar:/usr/local/tomcat/webapps/alfresco/WEB-INF/lib/content-dedup-1.0.0-SNAPSHOT.jar

volumes:
  postgres-data:
  activemq-data:
  solr-data:
  alfresco-data:
